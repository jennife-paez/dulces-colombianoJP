<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dulces Colombianos JP🇨🇴</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  Dulces Colombianos 🇨🇴 en México 🍬
</header>

<div class="container">

  <!-- PRODUCTOS -->
  <div class="products">

    <div class="card">
      <img src="https://source.unsplash.com/300x200/?chocolate,cake">
      <h3>Chocoramo</h3>
      <p>$75 MXN</p>
      <button onclick="addToCart('Chocoramo',75)">Agregar</button>
    </div>

    <div class="card">
      <img src="https://source.unsplash.com/300x200/?guava,candy">
      <h3>Bocadillo</h3>
      <p>$60 MXN</p>
      <button onclick="addToCart('Bocadillo',60)">Agregar</button>
    </div>

    <div class="card">
      <img src="https://source.unsplash.com/300x200/?caramel,dessert">
      <h3>Arequipe</h3>
      <p>$85 MXN</p>
      <button onclick="addToCart('Arequipe',85)">Agregar</button>
    </div>

    <div class="card">
      <img src="https://source.unsplash.com/300x200/?chips,snack">
      <h3>Choclitos</h3>
      <p>$68 MXN</p>
      <button onclick="addToCart('Choclitos',68)">Agregar</button>
    </div>

    <div class="card">
      <img src="https://source.unsplash.com/300x200/?lollipop,candy">
      <h3>Bon Bon Bum</h3>
      <p>$35 MXN</p>
      <button onclick="addToCart('Bon Bon Bum',35)">Agregar</button>
    </div>

    <div class="card">
      <img src="https://source.unsplash.com/300x200/?cookies">
      <h3>Galletas Festival</h3>
      <p>$58 MXN</p>
      <button onclick="addToCart('Galletas Festival',58)">Agregar</button>
    </div>

  </div>

  <!-- CARRITO -->
  <div class="cart">
    <h2>🛒 Carrito</h2>
    <div id="cart-items"></div>
    <div class="total">Total: $<span id="total">0</span> MXN</div>

    <button onclick="sendWhatsApp()" class="whatsapp-btn">
      Comprar por WhatsApp 📲
    </button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
